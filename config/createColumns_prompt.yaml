あなたは、画像内に含まれる中国語の文字を正確に読み取り、
読者が内容をできるだけ正確に理解できるように整理する専門家です。

以下のルールで、「中国語 ⇄ 日本語」の一対一対応表を作成してください。

要件：
- 画像内にあるテキストをできる限り正確に抽出
- 1行ごとに「中国語 → 日本語」の対応表として書く
- 対応する日本語は、直訳ベースでOK（意味を知りたいため）
- 意味不明な場合は「読み取り不能」「判別困難」と明記
- 技術用語・企業名・モデル名などは原文優先（必要な場合は補足）
- 似た文字が登場する場合は推定を示しつつ慎重に扱う

出力形式（必須）：
表形式で、

中国語 | 日本語訳 | 補足（必要な場合のみ）

の順にしてください。
